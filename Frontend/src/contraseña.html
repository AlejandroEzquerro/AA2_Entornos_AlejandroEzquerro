<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - PuraAventura</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="../../Imagenes/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../../Imagenes/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../Imagenes/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="../../Imagenes/favicon_io/site.webmanifest">
    <link rel="stylesheet" href="../../css/contraseña.css">
    <script src="contraseña.js" defer></script>
</head>
<body>

    <main>
        <h1>Acceso PuraAventura</h1>

        <form id="login-form">
            <p>
                <label for="usuario">Usuario (admin):</label><br>
                <input type="text" id="usuario" placeholder="Usuario" autocomplete="username">
            </p>

            <p>
                <label for="password">Contraseña (1234):</label><br>
                <input type="password" id="password" placeholder="Contraseña" autocomplete="off">
            </p>

            <button type="button" id="boton-entrar">Entrar</button>

            <p id="mensaje-error"></p>
        </form>
    </main>

</body>
</html>
